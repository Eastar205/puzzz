<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Puzzz - 앱 UI 프로토타입</title>
<style>
  :root {
    --bg: #f5f3fa;
    --panel: #ffffff;
    --panel-soft: #faf9fd;
    --panel-border: #e4e1ee;
    --ink: #2b2a3d;
    --ink-soft: #6b6880;
    --accent: #ff6b81;
    --accent-ink: #ffffff;
    --line: #e4e1ee;
    --shadow: 0 18px 40px -20px rgba(43,42,61,0.28);

    --ball-red: #ff5a6e;
    --ball-red-dark: #d43d51;
    --ball-blue: #4c8dff;
    --ball-blue-dark: #2f66d6;
    --ball-green: #3fc97a;
    --ball-green-dark: #269a58;
    --ball-yellow: #ffcf4d;
    --ball-yellow-dark: #d9a012;
    --ball-purple: #b26bff;
    --ball-purple-dark: #7f3fe0;

    --hp-good: #3fc97a;
    --hp-bad: #ff5a6e;
    --buff: #b26bff;
    --ok: #2fae66;
    --bad: #e2495a;

    --base-color: #4c8dff;
    --wave-orange: #ff9f43;
    --gold: #e8a93a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { touch-action: pan-y; overscroll-behavior: none; height: 100%; }

  body {
    min-height: 100vh;
    background: var(--bg);
    background-image:
      radial-gradient(ellipse 60% 40% at 20% 20%, rgba(76,141,255,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 80% 80%, rgba(178,107,255,0.05) 0%, transparent 70%);
    color: var(--ink);
    font-family: system-ui, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    display: flex;
    justify-content: center;
  }

  /* ═══════════════════════════════════════
     앱 프레임 / 상단바 / 하단 GNB
  ═══════════════════════════════════════ */
  .app-frame {
    width: 100%;
    max-width: 480px;
    height: 100dvh;
    height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    background: var(--panel);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .app-topbar {
    flex: none;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    position: sticky;
    top: 0;
    z-index: 30;
  }

  .app-logo {
    font-size: 15px;
    font-weight: 800;
    letter-spacing: -0.02em;
  }

  .topbar-icons {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .gold-display {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 6px 10px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: var(--panel-soft);
    font-size: 12px;
    font-weight: 800;
    color: var(--gold);
    font-variant-numeric: tabular-nums;
    transition: transform 120ms ease;
  }
  .gold-display.bump { transform: scale(1.12); }

  .topbar-icon {
    position: relative;
    width: 34px;
    height: 34px;
    border-radius: 12px;
    border: 1px solid var(--line);
    background: var(--panel-soft);
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .badge-dot {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--bad);
    border: 1.5px solid var(--panel);
    display: none;
  }
  .badge-dot.on { display: block; }

  .app-screens {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding: 12px;
  }

  .screen { display: none; }
  .screen.active { display: block; }

  /* 전투 화면은 스크롤 없이 남은 세로 공간을 그대로 채운다 (전장/퍼즐 비율은 아래 flex 값으로 결정) */
  #screen-battle.active {
    display: flex;
    flex-direction: column;
    height: 100%;
  }
  #screen-battle {
    height: 100%;
  }
  .app-screens:has(#screen-battle.active) {
    overflow: hidden;
    padding: 12px 12px 8px;
  }

  .app-gnb {
    position: sticky;
    bottom: 0;
    left: 0;
    right: 0;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    background: var(--panel);
    border-top: 1px solid var(--line);
    z-index: 30;
  }

  .gnb-btn {
    border: none;
    background: transparent;
    padding: 8px 2px 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    color: var(--ink-soft);
    cursor: pointer;
  }
  .gnb-btn .gnb-icon { font-size: 18px; }
  .gnb-btn .gnb-label { font-size: 10px; font-weight: 700; }
  .gnb-btn.active { color: var(--accent); }
  .gnb-btn.active .gnb-icon { transform: translateY(-1px); }

  /* ═══════════════════════════════════════
     공통 위젯
  ═══════════════════════════════════════ */
  .section-title {
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.04em;
    color: var(--ink-soft);
    text-transform: uppercase;
    margin: 18px 0 8px;
  }
  .section-title:first-child { margin-top: 0; }

  .toast {
    position: fixed;
    left: 50%;
    bottom: 96px;
    transform: translate(-50%, 12px);
    background: rgba(43,42,61,0.92);
    color: #fff;
    font-size: 12.5px;
    font-weight: 700;
    padding: 9px 16px;
    border-radius: 999px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 180ms ease, transform 180ms ease;
    z-index: 50;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translate(-50%, 0); }

  /* ═══════════════════════════════════════
     로비
  ═══════════════════════════════════════ */
  .lobby-hero {
    background: linear-gradient(180deg, var(--panel-soft), var(--panel));
    border: 1px solid var(--line);
    border-radius: 22px;
    padding: 22px 16px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .lobby-hero-icon {
    width: 96px;
    height: 96px;
    filter: drop-shadow(0 10px 16px rgba(212,61,81,0.25));
  }
  .lobby-hero-icon svg { display: block; width: 100%; height: 100%; }
  .lobby-hero-name { font-size: 16px; font-weight: 800; }
  .lobby-hero-sub { font-size: 11.5px; color: var(--ink-soft); }

  .lobby-banner {
    margin-top: 12px;
    border-radius: 18px;
    padding: 16px;
    background: linear-gradient(120deg, #4c8dff, #b26bff);
    color: #fff;
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }
  .lobby-banner-eyebrow { font-size: 10.5px; font-weight: 800; opacity: 0.85; letter-spacing: 0.06em; }
  .lobby-banner-title { font-size: 16px; font-weight: 800; margin-top: 2px; }
  .lobby-banner-dots { display: flex; gap: 4px; margin-top: 12px; }
  .lobby-banner-dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.4); }
  .lobby-banner-dot.on { background: #fff; }

  .lobby-shortcuts {
    margin-top: 10px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .lobby-shortcut {
    border: 1px solid var(--line);
    background: var(--panel-soft);
    border-radius: 14px;
    padding: 10px 12px;
    text-align: left;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .lobby-shortcut .icon { font-size: 16px; }
  .lobby-shortcut .label { font-size: 11.5px; font-weight: 700; }
  .lobby-shortcut .desc { font-size: 10px; color: var(--ink-soft); }

  .lobby-cta {
    margin-top: 14px;
    width: 100%;
    border: none;
    border-radius: 999px;
    padding: 13px;
    background: var(--accent);
    color: #fff;
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 8px 18px -6px rgba(255,107,129,0.55);
  }

  /* ═══════════════════════════════════════
     캐릭터 / 인벤토리
  ═══════════════════════════════════════ */
  .subtabs {
    display: flex;
    gap: 6px;
    background: var(--panel-soft);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 3px;
    margin-bottom: 12px;
  }
  .subtab-btn {
    flex: 1;
    border: none;
    background: transparent;
    padding: 7px 0;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    color: var(--ink-soft);
    cursor: pointer;
  }
  .subtab-btn.active { background: var(--accent); color: #fff; }

  .subpanel { display: none; }
  .subpanel.active { display: block; }

  .hero-row {
    display: flex;
    align-items: center;
    gap: 12px;
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 10px 12px;
    margin-bottom: 8px;
    background: var(--panel);
  }
  .hero-row-icon { width: 44px; height: 44px; flex: none; }
  .hero-row-icon svg { display: block; width: 100%; height: 100%; }
  .hero-row-info { flex: 1; min-width: 0; }
  .hero-row-name { font-size: 13.5px; font-weight: 800; }
  .hero-row-role { font-size: 10.5px; color: var(--ink-soft); margin-top: 1px; }
  .hero-row-stats { display: flex; gap: 10px; margin-top: 6px; }
  .hero-row-stat { font-size: 10px; color: var(--ink-soft); }
  .hero-row-stat b { color: var(--ink); font-variant-numeric: tabular-nums; }
  .hero-row-level {
    flex: none;
    font-size: 11px;
    font-weight: 800;
    color: var(--gold);
    background: rgba(232,169,58,0.14);
    border: 1px solid rgba(232,169,58,0.35);
    border-radius: 999px;
    padding: 4px 9px;
  }

  .empty-panel {
    border: 1px dashed var(--line);
    border-radius: 16px;
    padding: 32px 16px;
    text-align: center;
    color: var(--ink-soft);
    font-size: 12.5px;
    line-height: 1.6;
  }
  .empty-panel .emoji { font-size: 26px; display: block; margin-bottom: 8px; }

  /* ═══════════════════════════════════════
     상점
  ═══════════════════════════════════════ */
  .shop-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .shop-item {
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 12px 10px;
    background: var(--panel);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    text-align: center;
  }
  .shop-item .icon { font-size: 26px; }
  .shop-item .name { font-size: 11.5px; font-weight: 700; }
  .shop-item .desc { font-size: 9.5px; color: var(--ink-soft); }
  .shop-item .buy-btn {
    margin-top: 4px;
    width: 100%;
    border: none;
    border-radius: 999px;
    padding: 7px 0;
    background: var(--panel-soft);
    border: 1px solid var(--line);
    font-size: 11px;
    font-weight: 800;
    color: var(--ink);
    cursor: pointer;
  }
  .shop-item.featured .buy-btn { background: var(--accent); color: #fff; border-color: transparent; }

  /* ═══════════════════════════════════════
     도감 / 컬렉션
  ═══════════════════════════════════════ */
  .coll-summary {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--panel-soft);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 12px 14px;
    margin-bottom: 12px;
  }
  .coll-summary .num { font-size: 18px; font-weight: 800; font-variant-numeric: tabular-nums; }
  .coll-summary .bonus { font-size: 11px; color: var(--ok); font-weight: 700; }

  .coll-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .coll-entry {
    aspect-ratio: 1;
    border-radius: 16px;
    border: 1px solid var(--line);
    background: var(--panel);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px;
    position: relative;
  }
  .coll-entry svg { display: block; width: 100%; height: 100%; }
  .coll-entry.locked {
    background: var(--panel-soft);
    color: var(--ink-soft);
    font-size: 22px;
    font-weight: 800;
  }
  .coll-entry-label {
    position: absolute;
    bottom: -16px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 9px;
    font-weight: 700;
    color: var(--ink-soft);
  }
  .coll-entry-wrap { position: relative; margin-bottom: 18px; }

  /* ═══════════════════════════════════════
     전투 화면(기존 프로토타입 그대로 이식)
  ═══════════════════════════════════════ */
  #screen-battle { padding: 0; }
  #screen-battle .card {
    width: 100%;
    height: 100%;
    min-height: 0;
    background: var(--panel);
    border-radius: 22px;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* 헤더/웨이브 배너를 없애고 전장 내부 상단에 작은 태그로만 정보를 표시한다 */
  .field-wave-tag {
    position: absolute;
    top: 6px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 15;
    font-size: 10.5px;
    font-weight: 800;
    color: #fff;
    letter-spacing: 0.05em;
    background: rgba(0,0,0,0.45);
    padding: 3px 10px;
    border-radius: 999px;
  }

  .buff-banner {
    display: none;
    position: absolute;
    top: 6px;
    right: 8px;
    z-index: 15;
    align-items: center;
    gap: 4px;
    font-size: 10.5px;
    font-weight: 800;
    color: #fff;
    background: rgba(178,107,255,0.75);
    padding: 3px 10px;
    border-radius: 999px;
  }
  .buff-banner.active { display: flex; }

  .battle-area {
    background: var(--panel-soft);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    /* 참고 게임들의 화면 구성을 따라 전장은 작게, 퍼즐 보드가 훨씬 크게 (1 : 2) */
    flex: 1 1 0%;
    min-height: 0;
    position: relative;
    overflow: hidden;
  }
  .battle-ground {
    position: relative;
    flex: 1;
    min-height: 0;
    background: rgba(0,0,0,0.03);
    border: 1px dashed var(--line);
    border-radius: 12px;
    overflow: hidden;
  }
  .field-base { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 28px; z-index: 10; }
  .field-characters {
    position: absolute;
    left: 45px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: row-reverse;
    gap: 6px;
    z-index: 10;
  }
  .field-char { width: 22px; height: 22px; transition: transform 150ms ease; }
  .field-char svg { display: block; width: 100%; height: 100%; }
  .field-char.attacking { transform: scale(1.4) translateX(6px); }

  .field-monster {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 20px;
    transition: left 100ms linear;
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: default;
  }
  .field-monster.hit-anim { animation: monster-hurt 150ms ease-out; }
  @keyframes monster-hurt {
    0% { transform: translateY(-50%) scale(1.3); filter: sepia(1) saturate(5) hue-rotate(-50deg); }
    100% { transform: translateY(-50%) scale(1); filter: none; }
  }
  .field-monster-icon { width: 24px; height: 24px; }
  .field-monster-icon svg { display: block; width: 100%; height: 100%; }

  .monster-hp-bar { width: 22px; height: 3px; background: var(--line); border-radius: 99px; overflow: hidden; margin-top: 2px; }
  .monster-hp-bar-fill { height: 100%; background: var(--hp-good); }
  .base-hp-fill { height: 100%; background: var(--hp-good); transition: width 150ms ease, background 150ms ease; }
  .base-hp-fill.low { background: var(--hp-bad); }

  .field-projectile {
    position: absolute;
    font-size: 10px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 5;
    animation: projectile-move 200ms linear forwards;
  }
  @keyframes projectile-move { from { left: 70px; opacity: 1; } to { left: 90%; opacity: 0; } }

  .battle-status-row { display: flex; justify-content: space-between; align-items: center; font-size: 11px; font-weight: 700; }

  .characters-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
  .char-card-small {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: default;
    transition: border-color 150ms, box-shadow 150ms;
  }
  .char-card-small.down { opacity: 0.4; }
  .char-dot { width: 18px; height: 18px; border-radius: 50%; overflow: hidden; flex: none; }
  .char-dot svg { display: block; width: 100%; height: 100%; }

  .char-card-info { flex: 1; display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .char-card-name { font-size: 9px; font-weight: 700; color: var(--ink-soft); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .char-card-mana-track { height: 4px; border-radius: 99px; background: var(--line); overflow: hidden; }
  .char-card-mana-fill { height: 100%; transition: width 120ms; }
  .char-card-mana-fill.red { background: var(--ball-red); }
  .char-card-mana-fill.blue { background: var(--ball-blue); }
  .char-card-mana-fill.green { background: var(--ball-green); }
  .char-card-mana-fill.yellow { background: var(--ball-yellow); }
  .char-card-hp-fill { height: 100%; background: var(--hp-good); transition: width 150ms ease, background 150ms ease; }
  .char-card-hp-fill.low { background: var(--hp-bad); }

  .board-wrap {
    /* 참고 게임들의 화면 구성을 따라 퍼즐 보드가 전장(1)보다 훨씬 크게 (1 : 2) */
    flex: 2 1 0%;
    min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .board {
    height: 100%;
    width: auto;
    aspect-ratio: 1;
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    grid-template-rows: repeat(7, 1fr);
    gap: 4px;
    padding: 10px;
    background: var(--panel-soft);
    border: 1px solid var(--line);
    border-radius: 20px;
    touch-action: none;
  }
  .cell {
    position: relative;
    border-radius: 50%;
    border: none;
    padding: 0;
    background: transparent;
    transition: transform 100ms ease, box-shadow 100ms ease;
    touch-action: none;
  }
  .cell.filled { box-shadow: inset 0 -5px 8px rgba(0,0,0,0.28), inset 0 4px 5px rgba(255,255,255,0.28); }
  .cell.filled.selected { transform: scale(0.82); box-shadow: 0 0 0 3px var(--accent), inset 0 -5px 8px rgba(0,0,0,0.22); }
  .cell[data-color="red"] { background: radial-gradient(circle at 32% 28%, #ff98a4, var(--ball-red) 55%, var(--ball-red-dark) 100%); }
  .cell[data-color="blue"] { background: radial-gradient(circle at 32% 28%, #9dc0ff, var(--ball-blue) 55%, var(--ball-blue-dark) 100%); }
  .cell[data-color="green"] { background: radial-gradient(circle at 32% 28%, #92e6b6, var(--ball-green) 55%, var(--ball-green-dark) 100%); }
  .cell[data-color="yellow"] { background: radial-gradient(circle at 32% 28%, #ffe59e, var(--ball-yellow) 55%, var(--ball-yellow-dark) 100%); }
  .cell[data-color="purple"] { background: radial-gradient(circle at 32% 28%, #dcb8ff, var(--ball-purple) 55%, var(--ball-purple-dark) 100%); }

  .message { min-height: 18px; font-size: 12px; font-weight: 700; text-align: center; color: var(--ink-soft); }
  .message.live { color: var(--accent); }
  .message.ok { color: var(--ok); }
  .message.bad { color: var(--bad); }
  .caption { font-size: 10.5px; color: var(--ink-soft); line-height: 1.5; text-align: center; opacity: 0.7; }
</style>
</head>
<body>

<div class="app-frame">

  <!-- 상단바: 우편함 / 공지사항 / 출석부 (알림 배지) -->
  <div class="app-topbar">
    <div class="app-logo">Puzzz</div>
    <div class="topbar-icons">
      <div class="gold-display" id="goldDisplay">🪙 <span id="goldValue">0</span></div>
      <button class="topbar-icon" id="btnMailbox" title="우편함">📬<span class="badge-dot on" id="dotMailbox"></span></button>
      <button class="topbar-icon" id="btnNotice" title="공지사항">📢<span class="badge-dot on" id="dotNotice"></span></button>
      <button class="topbar-icon" id="btnAttendance" title="출석부">📅<span class="badge-dot" id="dotAttendance"></span></button>
    </div>
  </div>

  <div class="app-screens">

    <!-- ══════════════ 로비 / 홈 ══════════════ -->

<script>
  /* ═══════════════════════════════════════

    { color: "blue",   name: "마법사", role: "느림·강함",   emoji: "🧙", maxHp: 80,  attackDamage: 24, attackInterval: 3000 },

      glyph: '<g transform="translate(64,64) rotate(-45)"><rect x="-5" y="-38" width="10" height="46" rx="3" fill="#fff6ea"/><polygon points="-5,-38 5,-38 0,-50" fill="#fff6ea"/><rect x="-16" y="4" width="32" height="8" rx="4" fill="#e8d9b0"/><rect x="-4" y="10" width="8" height="18" rx="3" fill="#e8d9b0"/></g>' },
    blue: { grad: ["#9dc0ff", "#4c8dff", "#2f66d6"], stroke: "#1c3f8f",

    yellow: { grad: ["#ffe59e", "#ffcf4d", "#d9a012"], stroke: "#8f6205",

    green: { grad: ["#92e6b6", "#3fc97a", "#269a58"], stroke: "#155c34",

  };

  const MONSTER_ICON_DEFS = {
    "고블린": { grad: ["#a7a2bd", "#655f80", "#3a3550"], stroke: "#1f1b30",
      glyph: '<g transform="translate(64,68)"><polygon points="-22,-30 -30,-8 -14,-16" fill="#7ddc7f"/><polygon points="22,-30 30,-8 14,-16" fill="#7ddc7f"/><path d="M -26,-6 Q 0,-30 26,-6 Q 26,20 14,28 L 8,20 L 0,28 L -8,20 L -14,28 Q -26,20 -26,-6 Z" fill="#7ddc7f"/><circle cx="-10" cy="-2" r="4" fill="#241f33"/><circle cx="10" cy="-2" r="4" fill="#241f33"/><path d="M -8,12 L -3,7 L 2,12 L 7,7 L 12,12" fill="none" stroke="#241f33" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></g>' },
    "임프": { grad: ["#c79bd6", "#8a5aa0", "#563768"], stroke: "#301c3c",

  };

  function iconSvgMarkup(def, uid) {
    const gradId = "grad-" + uid;
    return '<svg viewBox="0 0 128 128" width="100%" height="100%">' +
      '<defs><radialGradient id="' + gradId + '" cx="35%" cy="30%" r="75%">' +
      '<stop offset="0%" stop-color="' + def.grad[0] + '"/>' +
      '<stop offset="55%" stop-color="' + def.grad[1] + '"/>' +
      '<stop offset="100%" stop-color="' + def.grad[2] + '"/></radialGradient></defs>' +
      '<circle cx="64" cy="64" r="60" fill="url(#' + gradId + ')"/>' +
      '<circle cx="64" cy="64" r="60" fill="none" stroke="' + def.stroke + '" stroke-opacity="0.25" stroke-width="2"/>' +
      def.glyph + "</svg>";
  }
  function characterIconSvg(color, uid) {
    const def = CHAR_ICON_DEFS[color];
    return def ? iconSvgMarkup(def, uid) : "";
  }
  function monsterIconSvg(label, uid) {
    const def = MONSTER_ICON_DEFS[label];
    return def ? iconSvgMarkup(def, uid) : null;
  }

  /* ═══════════════════════════════════════
     앱 셸: 탭 전환 / 토스트 / 상단바
  ═══════════════════════════════════════ */
  let toastTimer = null;
  function showToast(text) {
    const el = document.getElementById("toast");
    el.textContent = text;
    el.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove("show"), 1600);
  }

  function switchScreen(name) {
    document.querySelectorAll(".screen").forEach(s => s.classList.toggle("active", s.id === "screen-" + name));
    document.querySelectorAll(".gnb-btn").forEach(b => b.classList.toggle("active", b.dataset.screen === name));
    document.getElementById("app-screens-scroll") && (document.getElementById("app-screens-scroll").scrollTop = 0);
  }

  document.querySelectorAll(".gnb-btn").forEach(btn => {
    btn.addEventListener("click", () => switchScreen(btn.dataset.screen));
  });

  document.getElementById("btnEnterBattle").addEventListener("click", () => switchScreen("battle"));

  document.getElementById("btnMailbox").addEventListener("click", () => {
    document.getElementById("dotMailbox").classList.remove("on");
    showToast("우편함: 받은 편지함이 비어있습니다");
  });
  document.getElementById("btnNotice").addEventListener("click", () => {
    document.getElementById("dotNotice").classList.remove("on");
    showToast("공지사항: 신규 웨이브 업데이트 안내");
  });
  document.getElementById("btnAttendance").addEventListener("click", () => {
    showToast("출석부: 오늘 출석을 완료했습니다");
  });
  document.getElementById("btnSeasonPass").addEventListener("click", () => showToast("시즌 패스는 준비 중입니다"));
  document.getElementById("btnDailyQuest").addEventListener("click", () => showToast("일일 퀘스트는 준비 중입니다"));

  /* 로비 대표 캐릭터 + 이벤트 배너 */
  document.getElementById("lobbyHeroIcon").innerHTML = characterIconSvg("red", "lobby-hero");

  const LOBBY_BANNERS = [
    { eyebrow: "LIMITED EVENT", title: "🎉 신규 웨이브 오픈 기념 이벤트" },
    { eyebrow: "SEASON PASS", title: "🎫 시즌 패스로 추가 보상 받기" },
    { eyebrow: "NOTICE", title: "📢 밸런스 업데이트 안내" },
  ];
  let lobbyBannerIndex = 0;
  function renderLobbyBanner() {
    const b = LOBBY_BANNERS[lobbyBannerIndex];
    document.getElementById("lobbyBannerEyebrow").textContent = b.eyebrow;
    document.getElementById("lobbyBannerTitle").textContent = b.title;
    const dots = document.getElementById("lobbyBannerDots");
    dots.innerHTML = "";
    LOBBY_BANNERS.forEach((_, i) => {
      const d = document.createElement("div");
      d.className = "lobby-banner-dot" + (i === lobbyBannerIndex ? " on" : "");
      dots.appendChild(d);
    });
  }
  document.getElementById("lobbyBanner").addEventListener("click", () => {
    lobbyBannerIndex = (lobbyBannerIndex + 1) % LOBBY_BANNERS.length;
    renderLobbyBanner();
  });
  renderLobbyBanner();

  /* ═══════════════════════════════════════
     캐릭터 / 인벤토리 화면
  ═══════════════════════════════════════ */
  document.querySelectorAll(".subtab-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".subtab-btn").forEach(b => b.classList.toggle("active", b === btn));
      document.querySelectorAll(".subpanel").forEach(p => p.classList.toggle("active", p.id === "subpanel-" + btn.dataset.subtab));
    });
  });

  function renderHeroRoster() {
    const list = document.getElementById("heroRosterList");
    list.innerHTML = "";
    CHARACTERS.forEach(ch => {
      const row = document.createElement("div");
      row.className = "hero-row";
      const dps = (ch.attackDamage / (ch.attackInterval / 1000)).toFixed(1);
      row.innerHTML =
        `<div class="hero-row-icon">${characterIconSvg(ch.color, "roster-" + ch.color)}</div>` +
        `<div class="hero-row-info">` +
          `<div class="hero-row-name">${ch.name}</div>` +
          `<div class="hero-row-role">${ch.role}</div>` +
          `<div class="hero-row-stats">` +
            `<span class="hero-row-stat">체력 <b>${ch.maxHp}</b></span>` +
            `<span class="hero-row-stat">공격 <b>${ch.attackDamage}</b></span>` +
            `<span class="hero-row-stat">DPS <b>${dps}</b></span>` +
          `</div>` +
        `</div>` +
        `<div class="hero-row-level">Lv.1</div>`;
      list.appendChild(row);
    });
  }
  renderHeroRoster();

  /* ═══════════════════════════════════════
     상점 화면 (뽑기와 분리된 패키지/소모품/스킨)
  ═══════════════════════════════════════ */
  function renderShopSection(containerId, items) {
    const el = document.getElementById(containerId);

      const card = document.createElement("div");
      card.className = "shop-item" + (item.featured ? " featured" : "");

        `<div class="name">${item.name}</div>` +
        `<div class="desc">${item.desc}</div>` +
        `<button type="button" class="buy-btn">${item.price}</button>`;
      card.querySelector(".buy-btn").addEventListener("click", () => showToast(item.name + " 구매는 준비 중입니다"));
      el.appendChild(card);
    });
  }

  function renderCollection() {
    const heroesEl = document.getElementById("collHeroes");

    const monstersEl = document.getElementById("collMonsters");
    monstersEl.innerHTML = "";
    let unlockedCount = CHARACTERS.length;
    monsterLabels.forEach(label => {
      const icon = monsterIconSvg(label, "coll-m-" + label);
      const wrap = document.createElement("div");
      wrap.className = "coll-entry-wrap";
      if (icon) {
        unlockedCount++;
        wrap.innerHTML = `<div class="coll-entry">${icon}</div><div class="coll-entry-label">${label}</div>`;
      } else {
        wrap.innerHTML = `<div class="coll-entry locked">?</div><div class="coll-entry-label">미확인</div>`;
      }
      monstersEl.appendChild(wrap);
    });

    const total = CHARACTERS.length + monsterLabels.length;
    document.getElementById("collCount").textContent = unlockedCount + " / " + total;
    document.getElementById("collBonus").textContent = "추가 능력치 +" + unlockedCount + "%";
  }
  renderCollection();

  /* ═══════════════════════════════════════
     전투 화면 로직 (기존 프로토타입과 동일)
  ═══════════════════════════════════════ */
  const skillMode = "auto"; // 스킬은 항상 자동으로 발동 (수동 발동 UI 없음)
  let characters;
  let waveIndex;
  let activeMonsters;
  let speedMultiplier, buffTimeRemaining;
  let gameOver, waitingNextWave, gameStarted;
  let grid, chain, dragging;

  // 골드는 메타 재화라 전투를 다시 시작해도 초기화하지 않는다.
  let gold = 0;
  const goldValueEl = document.getElementById("goldValue");
  const goldDisplayEl = document.getElementById("goldDisplay");
  function addGold(amount) {
    gold += amount;
    goldValueEl.textContent = gold.toLocaleString();
    goldDisplayEl.classList.add("bump");
    setTimeout(() => goldDisplayEl.classList.remove("bump"), 150);
  }

  const boardEl        = document.getElementById("board");
  const battleGround   = document.getElementById("battleGround");
  const charactersBar  = document.getElementById("charactersBar");
  const messageEl      = document.getElementById("message");
  const baseHpFill     = document.getElementById("baseHpFill");
  const frontlineLabel = document.getElementById("frontlineLabel");
  const buffBanner     = document.getElementById("buffBanner");
  const buffTimeValue  = document.getElementById("buffTimeValue");
  const waveBadge      = document.getElementById("waveBadge");

  function rollOrbColor() {
    if (Math.random() < PURPLE_CHANCE) return "purple";
    return ["red","blue","yellow","green"][Math.floor(Math.random() * 4)];
  }
  function manaGainFor(chainLength) {
    let bonus = 1;
    if (chainLength >= 7) bonus = 2;
    else if (chainLength >= 4) bonus = 1.5;
    return 6 * chainLength * bonus;
  }
  function purpleBuffDuration(chainLength) {
    return 5 + Math.max(0, chainLength - 2) * 1.5;
  }
  function flashMessage(text, cls) {
    messageEl.textContent = text;
    messageEl.className = "message " + (cls || "");
  }
  function getFrontlineAlive() {
    return characters.find(c => c.hp > 0) || null;
  }
  function damageCharacter(ch, amount) {
    const wasAlive = ch.hp > 0;
    ch.hp = Math.max(0, ch.hp - amount);
    if (wasAlive && ch.hp === 0) flashMessage(ch.name + " 쓰러짐!", "bad");
  }

  function resetGame() {
    characters      = CHARACTERS.map(c => ({ ...c, mana: 0, attackTimer: 0, hp: c.maxHp }));
    waveIndex       = 0;
    activeMonsters  = [];
    speedMultiplier = 1;
    buffTimeRemaining = 0;
    gameOver        = false;
    waitingNextWave = false;
    gameStarted     = false;
    grid            = buildInitialGrid();
    chain           = [];
    dragging        = false;

    const overlay = document.getElementById("startOverlay");
    if (overlay) overlay.style.display = "flex";

    messageEl.textContent = "";
    messageEl.className   = "message";

    startWave(0);
    renderFieldCharacters();
    renderCharacters();
    renderBoard();
    renderBattle();
  }

  function renderFieldCharacters() {
    CHARACTERS.forEach(ch => {
      const el = document.getElementById("fChar-" + ch.color);
      if (el) el.innerHTML = characterIconSvg(ch.color, "field-" + ch.color);
    });
  }
  function buildInitialGrid() {
    return Array.from({ length: ROWS }, () => Array.from({ length: COLS }, rollOrbColor));
  }

  function startWave(idx) {
    if (idx >= WAVES.length) { endGame(true); return; }
    waveIndex = idx;
    activeMonsters = WAVES[idx].monsters.map((m, i) => {
      const delayOffset = i * 1.5;
      return {
        hp: m.hp, maxHp: m.maxHp, label: m.label, emoji: m.emoji,
        progress: -delayOffset / 10,
        id: Date.now() + "_" + i + "_" + Math.random(),
      };
    });
    waitingNextWave = false;
    flashMessage("WAVE " + (idx + 1) + " 시작!", "live");
    renderWaveBanner();
    renderBattle();
  }

  function handleWaveCleared() {
    if (waitingNextWave || gameOver) return;
    waitingNextWave = true;
    const next = waveIndex + 1;
    if (next >= WAVES.length) { endGame(true); return; }
    flashMessage("웨이브 클리어! 다음 웨이브가 곧 시작됩니다...", "ok");
    setTimeout(() => { if (!gameOver) startWave(next); }, WAVE_START_DELAY);
  }

  function getFrontTarget() {
    const spawnedMonsters = activeMonsters.filter(m => m.progress >= 0);
    if (spawnedMonsters.length === 0) return null;
    return spawnedMonsters.reduce((a, b) => a.progress > b.progress ? a : b);
  }

  let hitMonsterIds = new Set();
  function dealDamageToMonster(amount) {
    const target = getFrontTarget();
    if (!target) return;
    target.hp -= amount;
    hitMonsterIds.add(target.id);
    const mEl = document.getElementById("m-" + target.id);
    if (mEl) {
      mEl.classList.add("hit-anim");
      setTimeout(() => mEl.classList.remove("hit-anim"), 150);
    }
    setTimeout(() => hitMonsterIds.delete(target.id), 1500);
    if (target.hp <= 0) {
      if (mEl) mEl.remove();
      addGold(Math.max(3, Math.round(target.maxHp * 0.15)));
      activeMonsters = activeMonsters.filter(m => m !== target);
      if (activeMonsters.length === 0) handleWaveCleared();
    }
  }

  function triggerAttackVFX(color) {
    const charEl = document.getElementById("fChar-" + color);
    if (charEl) {
      charEl.classList.add("attacking");
      setTimeout(() => charEl.classList.remove("attacking"), 150);
    }
    const proj = document.createElement("div");
    proj.className = "field-projectile";
    proj.textContent = color === "blue" ? "⚡" : color === "yellow" ? "🏹" : "💥";
    proj.style.top = "50%";
    battleGround.appendChild(proj);
    setTimeout(() => proj.remove(), 200);
  }

  function castSkill(character, isOverchain = false) {
    character.mana = Math.max(0, character.mana - 100);
    triggerAttackVFX(character.color);
    const dmgMultiplier = isOverchain ? 2 : 1;
    const healMultiplier = isOverchain ? 2 : 1;
    if (character.color === "green") {
      const target = getFrontlineAlive() || character;
      const actualHeal = HEAL_AMOUNT * healMultiplier;
      target.hp = Math.min(target.maxHp, target.hp + actualHeal);
      const suffix = isOverchain ? " 💥오버체인!💥" : "";
      flashMessage(character.name + " 스킬!" + suffix + " " + target.name + " 체력 +" + actualHeal, "ok");
    } else {
      const actualDmg = SKILL_DAMAGE * dmgMultiplier;
      dealDamageToMonster(actualDmg);
      const suffix = isOverchain ? " 💥오버체인!💥" : "";
      flashMessage(character.name + " 스킬 발동!" + suffix + " " + actualDmg + " 피해", "ok");
    }
  }

  function canHealerAutoCast(ch) {
    const target = getFrontlineAlive();
    if (!target) return false;
    const healAmount = ch.storedOverchain ? HEAL_AMOUNT * 2 : HEAL_AMOUNT;
    return (target.maxHp - target.hp) >= healAmount;
  }

  function onChainResolved(color, chainLength) {
    const isOverchain = chainLength >= 10;
    if (color === "purple") {
      const duration = purpleBuffDuration(chainLength) * 1000;
      const mult = isOverchain ? BUFF_MULTIPLIER * 2 : BUFF_MULTIPLIER;
      speedMultiplier = mult;
      buffTimeRemaining = Math.max(buffTimeRemaining, duration);
      const msg = isOverchain
        ? "💥 오버체인 발동! 버프 공격속도 4배! " + (duration / 1000).toFixed(1) + "s 💥"
        : "보라 버프! 공격속도 2배 " + (duration / 1000).toFixed(1) + "s";
      flashMessage(msg, "live");
      document.getElementById("buffBanner").innerHTML = `⚡ ×${mult} <span id="buffTimeValue">${(duration / 1000).toFixed(1)}</span>s`;
      return;
    }
    const character = characters.find(c => c.color === color);
    if (!character || character.hp <= 0) return;
    const gain = manaGainFor(chainLength);
    character.mana += gain;
    if (character.mana >= 100) {
      if (character.color === "green") {
        if (canHealerAutoCast(character)) {
          castSkill(character, isOverchain);
        } else {
          // 힐이 낭비되지 않는 타이밍까지 마나를 유지하고, 오버체인 여부만 기억해둔다
          character.storedOverchain = isOverchain;
        }
      } else {
        castSkill(character, isOverchain);
      }
    } else {
      const msg = isOverchain
        ? "💥 오버체인! 마나 +" + Math.round(gain) + " 💥"
        : character.name + " 마나 +" + Math.round(gain);
      flashMessage(msg, "live");
    }
  }

  function endGame(won) {
    gameOver = true;
    flashMessage(won ? "🎉 전체 웨이브 클리어!" : "💀 기지가 함락됐어요.", won ? "ok" : "bad");
    document.getElementById("restartBtn").style.display = "block";
  }

  function tick(dtMs) {
    if (gameOver || waitingNextWave || !gameStarted) return;
    if (buffTimeRemaining > 0) {
      buffTimeRemaining = Math.max(0, buffTimeRemaining - dtMs);
      if (buffTimeRemaining === 0) speedMultiplier = 1;
    }
    const blocker = getFrontlineAlive();
    let reachedBase = false;
    activeMonsters.forEach(m => {
      const cap = blocker ? ENGAGE_THRESHOLD : 1;
      if (m.progress < cap) m.progress = Math.min(cap, m.progress + dtMs / APPROACH_DURATION);
      if (m.progress >= ENGAGE_THRESHOLD && blocker) {
        m.attackTimer = (m.attackTimer || 0) + dtMs;
        if (m.attackTimer >= MONSTER_ATTACK_INTERVAL) {
          m.attackTimer = 0;
          damageCharacter(blocker, MONSTER_ATTACK_DAMAGE);
        }
      }
      if (m.progress >= 1) reachedBase = true;
    });
    if (reachedBase) { endGame(false); return; }
    if (activeMonsters.length === 0 && !waitingNextWave) { handleWaveCleared(); return; }

    if (activeMonsters.length > 0) {
      characters.forEach(ch => {
        if (ch.hp <= 0) return;
        ch.attackTimer = (ch.attackTimer || 0) + dtMs * speedMultiplier;
        if (ch.attackTimer >= ch.attackInterval) {
          ch.attackTimer = 0;
          triggerAttackVFX(ch.color);
          dealDamageToMonster(ch.attackDamage);
        }
      });
    }

    characters.forEach(ch => {
      if (ch.hp <= 0) return;
      ch.mana += (dtMs / 1000) * 2.0;
      if (ch.mana >= 100) {
        if (ch.color === "green") {
          if (canHealerAutoCast(ch)) {
            castSkill(ch, ch.storedOverchain || false);
            ch.storedOverchain = false;
          }
        } else {
          castSkill(ch, ch.storedOverchain || false);
          ch.storedOverchain = false;
        }
      }
    });

    updateCharacterCards();
    updateMonsterField();
  }

  function updateMonsterField() {
    const activeSpawnedMonsters = activeMonsters.filter(m => m.progress >= 0);
    const currentIds = new Set(activeSpawnedMonsters.map(m => "m-" + m.id));
    const childs = Array.from(battleGround.querySelectorAll(".field-monster"));
    childs.forEach(c => { if (!currentIds.has(c.id)) c.remove(); });

    activeSpawnedMonsters.forEach(m => {
      let mEl = document.getElementById("m-" + m.id);
      if (!mEl) {
        mEl = document.createElement("div");
        mEl.id = "m-" + m.id;
        mEl.className = "field-monster";
        const iconSvg = monsterIconSvg(m.label, "monster-" + m.id);
        const iconHtml = iconSvg
          ? `<div class="field-monster-icon">${iconSvg}</div>`
          : `<span>${m.emoji}</span>`;
        mEl.innerHTML = `${iconHtml}<div class="monster-hp-bar"><div class="monster-hp-bar-fill" id="hp-bar-${m.id}"></div></div>`;
        battleGround.appendChild(mEl);
      }
      const maxLeft = 85, minLeft = 20;
      mEl.style.left = (maxLeft - (m.progress * (maxLeft - minLeft))) + "%";
      mEl.style.marginTop = "0px";
      const hpBar = document.getElementById("hp-bar-" + m.id);
      if (hpBar) hpBar.style.width = Math.max(0, (m.hp / m.maxHp) * 100) + "%";
    });
  }

  function renderWaveBanner() {
    waveBadge.textContent = "WAVE " + (waveIndex + 1) + " / " + WAVES.length;
  }

  function renderCharacters() {
    charactersBar.innerHTML = "";
    characters.forEach(ch => {
      const card = document.createElement("div");
      card.className = "char-card-small";
      card.innerHTML =
        `<div class="char-dot">${characterIconSvg(ch.color, "battlecard-" + ch.color)}</div>` +
        `<div class="char-card-info">` +
          `<div class="char-card-name">${ch.name}</div>` +
          `<div class="char-card-mana-track"><div class="char-card-hp-fill" style="width:100%"></div></div>` +
          `<div class="char-card-mana-track"><div class="char-card-mana-fill ${ch.color}" style="width:${ch.mana}%"></div></div>` +
        `</div>`;
      charactersBar.appendChild(card);
    });
  }

  function updateCharacterCards() {
    charactersBar.querySelectorAll(".char-card-small").forEach((card, i) => {
      const ch = characters[i];
      card.classList.toggle("down", ch.hp <= 0);
      const hpPct = (ch.hp / ch.maxHp) * 100;
      const hpFill = card.querySelector(".char-card-hp-fill");
      hpFill.style.width = hpPct + "%";
      hpFill.classList.toggle("low", hpPct < 30);
      const manaPct = Math.min(100, ch.mana);
      card.querySelector(".char-card-mana-fill").style.width = manaPct + "%";
      const nameEl = card.querySelector(".char-card-name");
      if (nameEl) nameEl.innerHTML = `${ch.name} <span style="font-size:8px; opacity:0.8;">MP:${Math.round(ch.mana)}</span>`;
    });
  }

  function renderBattle() {
    const blocker = getFrontlineAlive();
    if (blocker) {
      const hpPct = (blocker.hp / blocker.maxHp) * 100;
      frontlineLabel.textContent = blocker.name + " " + Math.round(blocker.hp) + "/" + blocker.maxHp;
      baseHpFill.style.width = hpPct + "%";
      baseHpFill.classList.toggle("low", hpPct < 30);
    } else {
      frontlineLabel.textContent = "전멸! 위험";
      baseHpFill.style.width = "100%";
      baseHpFill.classList.add("low");
    }
    buffBanner.classList.toggle("active", buffTimeRemaining > 0);
    buffTimeValue.textContent = (buffTimeRemaining / 1000).toFixed(1);
    renderWaveBanner();
    updateCharacterCards();
    updateMonsterField();
  }

  function renderBoard() {
    boardEl.innerHTML = "";
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const color = grid[r][c];
        const btn = document.createElement("button");
        btn.className = "cell filled";
        btn.type = "button";
        btn.dataset.r = r;
        btn.dataset.c = c;
        btn.dataset.color = color;
        btn.setAttribute("aria-label", color + " 구슬, " + (r+1) + "행 " + (c+1) + "열");
        boardEl.appendChild(btn);
      }
    }
    refreshHighlight();
  }

  function refreshHighlight() {
    boardEl.querySelectorAll(".cell").forEach(cell => {
      const r = +cell.dataset.r, c = +cell.dataset.c;
      cell.classList.toggle("selected", chain.some(p => p.r === r && p.c === c));
    });
    if (dragging && chain.length > 0) {
      const color = grid[chain[0].r][chain[0].c];
      if (color === "purple") {
        messageEl.textContent = "체인 " + chain.length + " · 놓으면 버프 " + purpleBuffDuration(chain.length).toFixed(1) + "s";
      } else {
        messageEl.textContent = "체인 " + chain.length + " · 놓으면 마나 +" + Math.round(manaGainFor(chain.length));
      }
      messageEl.className = "message live";
    }
  }

  function cellFromPoint(x, y) {
    const el = document.elementFromPoint(x, y);
    if (!el) return null;
    const cellEl = el.closest ? el.closest(".cell") : null;
    if (!cellEl) return null;
    return { r: +cellEl.dataset.r, c: +cellEl.dataset.c };
  }

  function isAdjacent(a, b) {
    const rowDiff = Math.abs(a.r - b.r);
    const colDiff = Math.abs(a.c - b.c);
    return rowDiff <= 1 && colDiff <= 1 && !(rowDiff === 0 && colDiff === 0);
  }

  function tryExtend(point) {
    const last = chain[chain.length - 1];
    if (last.r === point.r && last.c === point.c) return;
    if (chain.length >= 2) {
      const prev = chain[chain.length - 2];
      if (prev.r === point.r && prev.c === point.c) {
        chain.pop();
        refreshHighlight();
        return;
      }
    }
    if (chain.some(p => p.r === point.r && p.c === point.c)) return;
    const color = grid[point.r][point.c];
    const lastColor = grid[last.r][last.c];
    if (color !== lastColor || !isAdjacent(last, point)) return;
    chain.push(point);
    refreshHighlight();
  }

  function applyGravityAndRefill() {
    for (let c = 0; c < COLS; c++) {
      const values = [];
      for (let r = 0; r < ROWS; r++) { if (grid[r][c]) values.push(grid[r][c]); }
      const missing = ROWS - values.length;
      const fresh = Array.from({ length: missing }, rollOrbColor);
      const combined = fresh.concat(values);
      for (let r = 0; r < ROWS; r++) grid[r][c] = combined[r];
    }
  }

  function commitChain() {
    const color = grid[chain[0].r][chain[0].c];
    const chainLength = chain.length;
    for (const { r, c } of chain) grid[r][c] = null;
    chain = [];
    applyGravityAndRefill();
    renderBoard();
    onChainResolved(color, chainLength);
  }

  function onPointerDown(e) {
    if (gameOver) return;
    if (!gameStarted) startGamePlay();
    const point = cellFromPoint(e.clientX, e.clientY);
    if (!point) return;
    dragging = true;
    chain = [point];
    refreshHighlight();
    e.preventDefault();
  }
  function onPointerMove(e) {
    if (!dragging) return;
    const point = cellFromPoint(e.clientX, e.clientY);
    if (point) tryExtend(point);
  }
  function onPointerUp() {
    if (!dragging) return;
    dragging = false;
    if (chain.length >= MIN_CHAIN) commitChain();
    else { chain = []; refreshHighlight(); }
  }

  boardEl.addEventListener("pointerdown", onPointerDown);
  document.addEventListener("pointermove", onPointerMove);
  document.addEventListener("pointerup", onPointerUp);
  document.addEventListener("pointercancel", onPointerUp);

  document.getElementById("restartBtn").addEventListener("click", () => {
    document.getElementById("restartBtn").style.display = "none";
    resetGame();
  });

  function startGamePlay() {
    gameStarted = true;
    const overlay = document.getElementById("startOverlay");
    if (overlay) overlay.style.display = "none";
    flashMessage("디펜스 시작!", "live");
  }
  document.getElementById("startFieldBtn").addEventListener("click", startGamePlay);

  let lastTime = performance.now();
  function loop(now) {
    const dt = now - lastTime;
    lastTime = now;
    tick(dt);
    requestAnimationFrame(loop);
  }

  window.__puzzzDebug = {
    switchScreen,
    state: () => ({
      waveIndex, activeMonsters: activeMonsters.map(m => ({ label: m.label, hp: m.hp, progress: m.progress })),
      characters: characters.map(c => ({ color: c.color, name: c.name, hp: c.hp, mana: c.mana })),
      speedMultiplier, buffTimeRemaining, gameOver,
    }),
    skipWave: () => { activeMonsters = []; handleWaveCleared(); },
    damageCharacter: (index, amount) => { damageCharacter(characters[index], amount); renderBattle(); },
    tick,
  };

  resetGame();
  requestAnimationFrame(loop);
</script>
</body>
</html>
